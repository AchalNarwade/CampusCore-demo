<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusCore</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎓 CampusCore</h1>
    <p class="subtitle">Student Management System</p>

    <div class="form-card">

        <h2>Add / Update Student</h2>

        <input
                id="name"
                type="text"
                placeholder="Enter Student Name">

        <input
                id="email"
                type="email"
                placeholder="Enter Email">

        <input
                id="password"
                type="password"
                placeholder="Enter Password">

        <div class="button-group">

            <button class="add-btn" onclick="addStudent()">
                Add Student
            </button>

            <button class="update-btn" onclick="updateStudent()">
                Update Student
            </button>

            <button class="load-btn" onclick="loadStudents()">
                Refresh List
            </button>

        </div>

    </div>

    <h2>Students</h2>

    <div id="studentList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
